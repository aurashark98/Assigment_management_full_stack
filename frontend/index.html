
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>SaaS Landing Page Design</title>
      <link rel="icon" type="image/svg+xml" href="/maintenanceai-logo.svg" />
      <style>
        html, body { 
          height: 100%; 
          margin: 0; 
        } 
        #root { 
          height: 100%; 
        }

        /* ============================================
           ENTRY LOADING SCREEN STYLES
           ============================================ */
        #entry-loading {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 10000;
          opacity: 1;
          transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
          backdrop-filter: blur(10px);
        }

        #entry-loading.hidden {
          opacity: 0;
          pointer-events: none;
        }

        /* Loading container */
        .entry-loading-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 2rem;
        }

        .entry-loading-logo {
          position: relative;
          z-index: 10;
          width: 82px;
          height: 82px;
          border-radius: 18px;
          border: 1px solid rgba(148, 163, 184, 0.35);
          background: #ffffff;
          box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
          padding: 8px;
          object-fit: cover;
        }

        /* Animated gradient background accent */
        .entry-loading-bg {
          position: absolute;
          width: 400px;
          height: 400px;
          background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
          border-radius: 50%;
          filter: blur(60px);
          animation: pulse-glow 4s ease-in-out infinite;
        }

        @keyframes pulse-glow {
          0%, 100% {
            transform: scale(1);
            opacity: 0.3;
          }
          50% {
            transform: scale(1.2);
            opacity: 0.6;
          }
        }

        /* Dual-ring spinner */
        .entry-spinner {
          position: relative;
          width: 64px;
          height: 64px;
        }

        .entry-spinner-ring {
          position: absolute;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          border: 3px solid transparent;
        }

        .entry-spinner-ring:nth-child(1) {
          border-top-color: #2563eb;
          border-right-color: #93c5fd;
          animation: spin-cw 2.5s linear infinite;
        }

        .entry-spinner-ring:nth-child(2) {
          width: 80%;
          height: 80%;
          top: 10%;
          left: 10%;
          border-bottom-color: #60a5fa;
          border-left-color: #cbd5e1;
          animation: spin-ccw 3.5s linear infinite;
        }

        @keyframes spin-cw {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }

        @keyframes spin-ccw {
          from { transform: rotate(0deg); }
          to { transform: rotate(-360deg); }
        }

        /* Loading text */
        .entry-loading-text {
          position: relative;
          z-index: 10;
          text-align: center;
        }

        .entry-loading-title {
          font-size: 1.25rem;
          font-weight: 600;
          color: #0f172a;
          margin: 0;
          letter-spacing: -0.5px;
        }

        .entry-loading-subtitle {
          font-size: 0.875rem;
          color: #64748b;
          margin: 0.5rem 0 0 0;
          animation: fade-pulse 2s ease-in-out infinite;
        }

        @keyframes fade-pulse {
          0%, 100% { opacity: 0.6; }
          50% { opacity: 1; }
        }

        /* Progress bar */
        .entry-loading-progress {
          position: relative;
          width: 120px;
          height: 3px;
          background: rgba(148, 163, 184, 0.25);
          border-radius: 2px;
          overflow: hidden;
          z-index: 10;
        }

        .entry-loading-progress-bar {
          height: 100%;
          background: linear-gradient(90deg, #2563eb, #60a5fa, #2563eb);
          background-size: 200% 100%;
          animation: progress-slide 1.5s ease-in-out infinite;
        }

        @keyframes progress-slide {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
      </style>
    </head>

    <body>
      <!-- Entry Loading Screen -->
      <div id="entry-loading" class="entry-loading-container">
        <div class="entry-loading-bg"></div>
        <img src="/maintenanceai-logo.svg" alt="MaintenanceAI Logo" class="entry-loading-logo" />
        <div class="entry-spinner">
          <div class="entry-spinner-ring"></div>
          <div class="entry-spinner-ring"></div>
        </div>
        <div class="entry-loading-text">
          <h2 class="entry-loading-title">Loading MaintenanceAI...</h2>
          <p class="entry-loading-subtitle">Initializing application</p>
        </div>
        <div class="entry-loading-progress">
          <div class="entry-loading-progress-bar"></div>
        </div>
      </div>

      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
